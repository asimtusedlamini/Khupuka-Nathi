<div class="container">
    <h2>Send us a Email with any questions</h2>
    <form>
        <label>Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Message:</label><br>
        <textarea name="message"></textarea><br><br>

        <button type="submit">Submit</button>
    </form>
</div>

<h2>Enquiry Form</h2>
    <p>Please select the programme you are interested in and fill in your details.</p>

    <form>

        <!-- PERSONAL DETAILS -->
        <label>Full Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Email Address:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" required><br><br>

        <!-- PROGRAMME SELECTION -->
        <label>Select Programme:</label><br>
        <select name="programme" required>
            <option value="">-- Choose a programme --</option>
            <option value="education">Education Support</option>
            <option value="skills">Skills Development & Learnerships</option>
            <option value="employment">Youth Employment Initiatives</option>
            <option value="stipend">Stipend-Based Programmes</option>
        </select><br><br>

    

        <!-- MESSAGE -->
        <label>Message / Additional Info:</label><br>
        <textarea name="message" rows="4" placeholder="Tell us more..."></textarea><br><br>

        <button type="submit">Submit Enquiry</button>

    </form>

</div>
